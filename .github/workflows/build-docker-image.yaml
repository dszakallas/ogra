name: Build and Publish Docker Image

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            accept-flake-config = true
            extra-experimental-features = configurable-impure-env fetch-tree flakes nix-command

      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: devenv

      - name: Build Docker image with Nix
        id: build
        run: |
          IMAGE_PATH=$(nix build .#dockerImage --print-out-paths)
          echo "image_path=${IMAGE_PATH}" >> $GITHUB_OUTPUT

      - name: Load Docker image
        run: |
          docker load < ${{ steps.build.outputs.image_path }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          # Use the Nix store path hash as the tag
          TAG=$(basename "${{ steps.build.outputs.image_path }}" | cut -d'-' -f1)
          
          # Convert target image name to lowercase (required by ghcr)
          TARGET_IMAGE_BASE="ghcr.io/${{ github.repository }}"
          TARGET_IMAGE_BASE_LOWER=$(echo "$TARGET_IMAGE_BASE" | tr '[:upper:]' '[:lower:]')
          
          TARGET_IMAGE="${TARGET_IMAGE_BASE_LOWER}:${TAG}"
          TARGET_IMAGE_LATEST="${TARGET_IMAGE_BASE_LOWER}:latest"

          docker tag ogra:latest ${TARGET_IMAGE}
          docker tag ogra:latest ${TARGET_IMAGE_LATEST}
          
          docker push ${TARGET_IMAGE}
          docker push ${TARGET_IMAGE_LATEST}

          echo "Published image: ${TARGET_IMAGE}"
          echo "Published image: ${TARGET_IMAGE_LATEST}"
