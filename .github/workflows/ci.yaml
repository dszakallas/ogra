name: Run CI checks

on: # yamllint disable-line rule:truthy
  pull_request:
    types: [opened, synchronize, labeled]
    branches:
      - "**"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_TOKEN }}
      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-25.11
      - uses: cachix/cachix-action@v17
        with:
          name: devenv
      - run: nix profile add nixpkgs#devenv
      - run: devenv test --dont-override-dotfile
      - name: Build backend package with Nix
        run: nix build .#backend --extra-experimental-features "nix-command flakes"
      - name: Apply autofixes
        if: |
          failure() && (
            contains(github.event.pull_request.labels.*.name, 'autofix') ||
            github.actor == 'renovate[bot]' ||
            startsWith(github.head_ref, 'renovate/')
          )
        shell: devenv shell bash -- -e {0}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Run the standalone script to update the Nix hashes if dependencies changed
          ./scripts/update-nix-hashes.sh

          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "chore: apply autofixes"
            FIX_COMMIT_SHA=$(git rev-parse HEAD)
            git checkout ${{ github.head_ref }}
            git cherry-pick ${FIX_COMMIT_SHA}
            git push origin ${{ github.head_ref }}
          fi
